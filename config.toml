# AISOS framework configuration
# Mirrors fields consumed by aisos/config.py.

# Hard limits enforced by the orchestration loop.
max_steps = 25

[routing]
# Capability -> {provider, model_deployment}
# Capability keys are free-form strings used by intelligence/router.py.
default = { provider = "azure_openai", model = "gpt-4o" }
plan    = { provider = "azure_openai", model = "gpt-4o" }
embed   = { provider = "azure_openai", model = "text-embedding-3-small" }

[rbac]
# Agent name -> list of tool scopes the agent is permitted to invoke.
planner    = ["read", "write", "compute"]
researcher = ["read"]
default    = ["read"]

[cost]
# Pricing in USD per 1K tokens. Used by observability/cost_tracker.py.
[cost."gpt-4o"]
input  = 0.0025
output = 0.01

[cost."text-embedding-3-small"]
input  = 0.00002
output = 0.0
