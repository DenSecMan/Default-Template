# AISOS framework configuration
# Mirrors fields consumed by aisos/config.py.

# Hard limits enforced by the orchestration loop.
max_steps = 25

[routing]
# Capability -> {provider, model}
# `model` is the Azure OpenAI *deployment name*. Leave empty ("") to fall back to
# AZURE_OPENAI_DEPLOYMENT_CHAT / AZURE_OPENAI_DEPLOYMENT_EMBED from .env.
# Only override here if you have multiple deployments and want per-capability routing.
default = { provider = "azure_openai", model = "" }
plan    = { provider = "azure_openai", model = "" }
embed   = { provider = "azure_openai", model = "" }

[rbac]
# Agent name -> list of tool scopes the agent is permitted to invoke.
planner    = ["read", "write", "compute"]
researcher = ["read"]
default    = ["read"]

[cost]
# Pricing in USD per 1K tokens. Used by observability/cost_tracker.py.
[cost."gpt-4o"]
input  = 0.0025
output = 0.01

[cost."text-embedding-3-small"]
input  = 0.00002
output = 0.0
